<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#07080c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#e2b714"/>
      <stop offset="100%" stop-color="#a07818"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>

  <!-- 外框盾牌 -->
  <path d="M128 16 L224 60 L224 140 C224 190 180 230 128 248 C76 230 32 190 32 140 L32 60 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.6"/>
  <path d="M128 28 L212 66 L212 138 C212 182 172 218 128 234 C84 218 44 182 44 138 L44 66 Z"
        fill="rgba(255,215,0,0.03)" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- 中心圆环 -->
  <circle cx="128" cy="120" r="52" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.5"/>
  <circle cx="128" cy="120" r="44" fill="rgba(255,215,0,0.04)" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- BG 文字 -->
  <text x="128" y="112" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="42" font-weight="900" fill="url(#goldGrad2)" filter="url(#glow)">BG</text>

  <!-- 底部小字 LEAGUE -->
  <text x="128" y="138" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="700" fill="#6b7280" letter-spacing="4">LEAGUE</text>

  <!-- 顶部装饰星 -->
  <polygon points="128,40 131,48 139,48 133,53 135,61 128,56 121,61 123,53 117,48 125,48"
           fill="url(#goldGrad)" opacity="0.6"/>

  <!-- 底部排名数字装饰 -->
  <text x="76" y="190" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="14" font-weight="900" fill="#ffd700" opacity="0.15">1</text>
  <text x="102" y="196" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="12" font-weight="900" fill="#c0c0c0" opacity="0.12">2</text>
  <text x="128" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="900" fill="#cd7f32" opacity="0.10">3</text>
  <text x="154" y="196" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="12" font-weight="900" fill="#6b7280" opacity="0.10">4</text>
  <text x="180" y="190" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="14" font-weight="900" fill="#6b7280" opacity="0.08">5</text>

  <!-- 边角装饰点 -->
  <circle cx="60" cy="60" r="2" fill="#e2b714" opacity="0.3"/>
  <circle cx="196" cy="60" r="2" fill="#e2b714" opacity="0.3"/>
  <circle cx="60" cy="180" r="1.5" fill="#e2b714" opacity="0.2"/>
  <circle cx="196" cy="180" r="1.5" fill="#e2b714" opacity="0.2"/>
</svg>
